apiVersion: apps/v1
kind: Deployment
metadata:
  name: sysrms
spec:
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: Exists
                topologyKey: kubernetes.io/hostname
